<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>318 Catering Assistant</title><link rel="stylesheet" href="styles.css"><style>body{background:#0c0c0d;color:#fff}.chat-shell{max-width:820px;margin:0 auto;padding:28px}.chat-card{background:#171719;border:1px solid #343438;border-radius:24px;overflow:hidden}.chat-head{padding:24px;border-bottom:1px solid #343438;display:flex;justify-content:space-between;align-items:center}.chat-body{padding:24px;min-height:420px}.bubble{max-width:78%;padding:14px 16px;border-radius:18px;margin:10px 0;line-height:1.55}.bot{background:#29292d}.user{background:#d61f26;margin-left:auto}.composer{display:grid;grid-template-columns:1fr auto;gap:10px;padding:18px;border-top:1px solid #343438}.composer input{padding:14px;border-radius:14px;border:1px solid #444;background:#111;color:#fff}.composer button{border:0;border-radius:14px;padding:0 22px;background:#d61f26;color:#fff;font-weight:800}.quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:15px}.quick button{border:1px solid #555;background:transparent;color:#fff;border-radius:999px;padding:9px 12px}.note{color:#aaa;font-size:12px}</style></head><body><div class="chat-shell"><a href="index.html" style="color:#fff;text-decoration:none">← Back to website</a><div class="chat-card" style="margin-top:18px"><div class="chat-head"><div><strong>318 Catering Assistant</strong><div class="note">Interactive preview — no messages are sent</div></div><img src="assets/images/logo.jpeg" alt="318 Food Co" style="width:52px;height:52px;border-radius:14px;object-fit:cover"></div><div id="messages" class="chat-body"><div class="bubble bot">Hi! I can help you compare catering menus, plan around your guest count, and start a quote. How many people are you feeding?</div><div class="quick"><button data-q="I am feeding 25 people">25 guests</button><button data-q="I am feeding 75 people">75 guests</button><button data-q="I am feeding 150 people">150 guests</button><button data-q="Show me the menu options">Menu options</button></div></div><div class="composer"><input id="msg" placeholder="Type your catering question"><button id="send">Send</button></div></div></div><script>(function(){var box=document.getElementById('messages'),input=document.getElementById('msg');function add(t,c){var d=document.createElement('div');d.className='bubble '+c;d.textContent=t;box.appendChild(d);box.scrollTop=box.scrollHeight;}function reply(t){var x=t.toLowerCase(),n=(t.match(/\d+/)||[])[0];if(n){var g=Number(n);return g<15?'Our catering minimum is 15 guests. For a smaller group, please contact us and we will tell you what is available.':g<=50?'For '+g+' guests, Pizza & Salad, Taco Bar, or Deli Buffet are easy crowd-pleasers. Would you like to compare those?':g<=125?'For '+g+' guests, Taco Bar, Pasta Bar, BBQ Bar, and Pizza & Salad all work well. Tell me your event type or approximate budget.':'For '+g+' guests, BBQ Bar or Taco Bar are strong buffet options. We can also discuss staffing, setup, and delivery in your quote.';}if(x.indexOf('dessert')>=0)return 'For now, dessert choices are cookies or brownies.';if(x.indexOf('menu')>=0)return 'Current options include Taco Bar, Fajita Bar, BBQ Bar, Deli Buffet, Pasta Bar, and Pizza & Salad.';if(x.indexOf('price')>=0||x.indexOf('budget')>=0)return 'Pricing depends on menu, guest count, delivery, setup, and add-ons. Use Plan My Event for a preliminary estimate, then 318 Food Co. will confirm the final quote.';return 'I can help with guest count, menu choices, desserts, and preliminary pricing. For custom requests, I will include your note in the quote rather than promise something the team has not approved.';}function send(t){if(!t.trim())return;add(t,'user');setTimeout(function(){add(reply(t),'bot');},250);input.value='';}document.getElementById('send').onclick=function(){send(input.value)};input.onkeydown=function(e){if(e.key==='Enter')send(input.value)};document.querySelectorAll('[data-q]').forEach(function(b){b.onclick=function(){send(b.getAttribute('data-q'))}});})();</script><script src="/api/runtime-config"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/supabase.js"></script><script src="js/site-settings.js"></script></body></html>
