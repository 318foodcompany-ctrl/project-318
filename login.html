<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>318 Owner Login</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111, #5b1111);
    }

    .login-card {
      width: min(420px, 100%);
      padding: 32px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    h1 { margin-top: 0; }

    label {
      display: block;
      margin-top: 16px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: 0;
      border-radius: 10px;
      background: #e21b23;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    #message {
      min-height: 24px;
      margin-top: 16px;
    }
  </style>
</head>

<body>
  <main class="login-card">
    <h1>318 Owner Login</h1>
    <p>Sign in to manage your website and leads.</p>

    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" required autocomplete="email">

      <label for="password">Password</label>
      <input id="password" type="password" required autocomplete="current-password">

      <button type="submit">Sign In</button>
      <p id="message"></p>
    </form>
  </main>

  <script src="/api/runtime-config"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>

  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");
    if (new URLSearchParams(window.location.search).get("error") === "unauthorized") {
      message.textContent = "This account does not have administrator access.";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      message.textContent = "Signing in...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        message.textContent = error.message;
        return;
      }

      const { data: isAdmin, error: adminError } = await supabaseClient.rpc("crm_is_admin");
      if (adminError || isAdmin !== true) {
        await supabaseClient.auth.signOut();
        message.textContent = "This account does not have administrator access.";
        return;
      }

      window.location.href = "admin.html";
    });
  </script>
</body>
</html>
